<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather OS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --glass: rgba(10, 10, 15, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background: #050505;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            transition: background 1s ease-in-out;
        }

        .weather-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .search-area { display: flex; gap: 10px; margin-bottom: 20px; position: relative; }

        input {
            flex: 1;
            padding: 12px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon-blue);
            border-radius: 30px;
            color: white;
            outline: none;
            font-family: 'Orbitron', sans-serif;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-icon:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 15px var(--neon-blue); }

        /* Main Weather Info */
        .main-display { text-align: center; margin-bottom: 30px; }
        .temp { font-size: 72px; font-weight: 300; color: #fff; }
        .city { font-family: 'Orbitron', sans-serif; font-size: 24px; margin-bottom: 5px; }
        
        /* 5-Day Forecast Grid */
        .forecast-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .forecast-item {
            text-align: center;
            font-size: 12px;
            background: rgba(255,255,255,0.03);
            padding: 10px 5px;
            border-radius: 10px;
        }
        .forecast-item img { width: 30px; }

        /* Dropdown */
        #cityList {
            position: absolute; top: 55px; left: 0; width: calc(100% - 55px);
            background: #111; border: 1px solid var(--neon-blue);
            list-style: none; z-index: 100; border-radius: 10px; display: none;
        }
        #cityList li { padding: 10px; cursor: pointer; }
        #cityList li:hover { background: var(--neon-blue); color: #000; }
    </style>
</head>
<body>

    <div class="weather-card">
        <div class="search-area">
            <input type="text" id="cityInput" placeholder="Locate City..." autocomplete="off">
            <button class="btn-icon" onclick="getLocation()">📍</button>
            <ul id="cityList"></ul>
        </div>

        <div id="weatherDisplay" style="display: none;">
            <div class="main-display">
                <img id="mainIcon" src="" alt="icon">
                <div class="city" id="cityName">---</div>
                <div class="temp"><span id="tempValue">0</span>°C</div>
                <div id="weatherDesc" style="text-transform: capitalize; opacity: 0.7;">---</div>
            </div>

            <div class="forecast-container" id="forecast">
                </div>
        </div>
    </div>

    <script>
        const apiKey = 'YOUR_API_KEY_HERE'; // Replace with your key
        const cityInput = document.getElementById('cityInput');
        const cityList = document.getElementById('cityList');

        const commonCities = ["Chennai", "Madurai", "Singapore", "London", "Dubai", "New York", "Tokyo"];

        // Dynamic Background Mapping
        const bgMap = {
            Clear: "url('https://images.unsplash.com/photo-1506452305024-9d3f02d1c9b0?auto=format&fit=crop&w=1920&q=80')",
            Clouds: "url('https://images.unsplash.com/photo-1483977399921-6cf3832f79a6?auto=format&fit=crop&w=1920&q=80')",
            Rain: "url('https://images.unsplash.com/photo-1534274988757-a28bf1a53c17?auto=format&fit=crop&w=1920&q=80')",
            Snow: "url('https://images.unsplash.com/photo-1478265409131-1f65c88f965c?auto=format&fit=crop&w=1920&q=80')",
            Thunderstorm: "url('https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?auto=format&fit=crop&w=1920&q=80')"
        };

        // 1. Geolocation (New Feature)
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    fetchWeatherByCoords(pos.coords.latitude, pos.coords.longitude);
                });
            }
        }

        async function fetchWeatherByCoords(lat, lon) {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`;
            const res = await fetch(url);
            const data = await res.json();
            updateUI(data);
            getForecast(data.name);
        }

        // 2. City Dropdown Filter
        cityInput.addEventListener('input', () => {
            const val = cityInput.value.toLowerCase();
            cityList.innerHTML = '';
            if(val) {
                const matches = commonCities.filter(c => c.toLowerCase().includes(val));
                cityList.style.display = matches.length ? 'block' : 'none';
                matches.forEach(m => {
                    const li = document.createElement('li');
                    li.textContent = m;
                    li.onclick = () => { cityInput.value = m; cityList.style.display = 'none'; getWeather(m); };
                    cityList.appendChild(li);
                });
            } else { cityList.style.display = 'none'; }
        });

        async function getWeather(city) {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
            if(res.ok) {
                const data = await res.json();
                updateUI(data);
                getForecast(city);
            }
        }

        // 3. 5-Day Forecast logic (New Feature)
        async function getForecast(city) {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${apiKey}`);
            const data = await res.json();
            const forecastEl = document.getElementById('forecast');
            forecastEl.innerHTML = '';

            // OpenWeather forecast gives data every 3 hours. We pick 1 per day (every 8th index).
            for(let i = 0; i < data.list.length; i += 8) {
                const dayData = data.list[i];
                const date = new Date(dayData.dt * 1000).toLocaleDateString('en', {weekday: 'short'});
                forecastEl.innerHTML += `
                    <div class="forecast-item">
                        <div>${date}</div>
                        <img src="https://openweathermap.org/img/wn/${dayData.weather[0].icon}.png">
                        <div>${Math.round(dayData.main.temp)}°</div>
                    </div>
                `;
            }
        }

        function updateUI(data) {
            document.body.style.backgroundImage = bgMap[data.weather[0].main] || bgMap.Clear;
            document.getElementById('cityName').innerText = data.name;
            document.getElementById('tempValue').innerText = Math.round(data.main.temp);
            document.getElementById('weatherDesc').innerText = data.weather[0].description;
            document.getElementById('mainIcon').src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
            document.getElementById('weatherDisplay').style.display = 'block';
        }
        
        cityInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(cityInput.value) });
    </script>
</body>
</html>
