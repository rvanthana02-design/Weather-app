<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Weather Protocol</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Roboto', sans-serif;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .weather-card {
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 20px; color: var(--neon-blue); letter-spacing: 2px; }

        /* Search Section with Dropdown */
        .search-box { position: relative; width: 100%; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 12px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 30px;
            color: white;
            outline: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
        }

        /* Dropdown Menu Style */
        .city-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 25, 0.95);
            border: 1px solid var(--neon-blue);
            border-radius: 10px;
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .city-dropdown li {
            padding: 12px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .city-dropdown li:hover { background: var(--neon-blue); color: black; }

        /* Weather Display */
        .weather-info { display: none; }

        .temp { font-size: 64px; font-weight: 300; margin: 10px 0; }
        .city-name { font-family: 'Orbitron', sans-serif; font-size: 20px; text-transform: uppercase; }
        .description { text-transform: capitalize; opacity: 0.8; margin-bottom: 20px; }

        .details {
            display: flex;
            justify-content: space-around;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .detail-col { display: flex; flex-direction: column; font-size: 14px; }
        .detail-label { opacity: 0.6; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }

        .weather-icon { width: 100px; filter: drop-shadow(0 0 10px var(--neon-blue)); }

        .error { color: #ff0055; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="weather-card">
        <h2>Weather OS</h2>
        
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter City Name..." autocomplete="off">
            <ul id="cityList" class="city-dropdown"></ul>
            <p id="errorMsg" class="error">City not found. Try again.</p>
        </div>

        <div id="weatherContent" class="weather-info">
            <img src="" id="icon" class="weather-icon" alt="weather-status">
            <div class="temp"><span id="tempValue">0</span>°C</div>
            <div class="city-name" id="displayCity">---</div>
            <div class="description" id="weatherDesc">---</div>
            
            <div class="details">
                <div class="detail-col">
                    <span class="detail-label">Humidity</span>
                    <span id="humidity">0%</span>
                </div>
                <div class="detail-col">
                    <span class="detail-label">Wind Speed</span>
                    <span id="wind">0 km/h</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = 'YOUR_API_KEY_HERE'; // REPLACE WITH YOUR OPENWEATHER API KEY
        const cityInput = document.getElementById('cityInput');
        const cityList = document.getElementById('cityList');
        const weatherContent = document.getElementById('weatherContent');
        const errorMsg = document.getElementById('errorMsg');

        // Predefined list for the dropdown menu
        const commonCities = [
            "Chennai", "Mumbai", "Delhi", "Bangalore", "Singapore", 
            "London", "New York", "Tokyo", "Dubai", "Paris", "Berlin"
        ];

        // Filter and Show Dropdown
        cityInput.addEventListener('input', () => {
            const val = cityInput.value.toLowerCase();
            cityList.innerHTML = '';
            
            if (val.length > 0) {
                const filtered = commonCities.filter(city => city.toLowerCase().includes(val));
                if (filtered.length > 0) {
                    cityList.style.display = 'block';
                    filtered.forEach(city => {
                        const li = document.createElement('li');
                        li.textContent = city;
                        li.onclick = () => selectCity(city);
                        cityList.appendChild(li);
                    });
                } else {
                    cityList.style.display = 'none';
                }
            } else {
                cityList.style.display = 'none';
            }
        });

        function selectCity(city) {
            cityInput.value = city;
            cityList.style.display = 'none';
            getWeather(city);
        }

        // Enter key support
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                getWeather(cityInput.value);
                cityList.style.display = 'none';
            }
        });

        async function getWeather(city) {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`);
                
                if (!response.ok) throw new Error("Not Found");

                const data = await response.json();
                displayWeather(data);
                errorMsg.style.display = 'none';
            } catch (err) {
                errorMsg.style.display = 'block';
                weatherContent.style.display = 'none';
            }
        }

        function displayWeather(data) {
            document.getElementById('tempValue').innerText = Math.round(data.main.temp);
            document.getElementById('displayCity').innerText = data.name;
            document.getElementById('weatherDesc').innerText = data.weather[0].description;
            document.getElementById('humidity').innerText = data.main.humidity + "%";
            document.getElementById('wind').innerText = data.wind.speed + " km/h";
            
            // Icon mapping
            const iconCode = data.weather[0].icon;
            document.getElementById('icon').src = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;

            weatherContent.style.display = 'block';
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target !== cityInput) cityList.style.display = 'none';
        });
    </script>
</body>
</html>
